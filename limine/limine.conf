# Limine configuration file for Utopia OS
# Using Limine native protocol (Stivale2)

# Timeout in seconds
timeout: 5

# Default entry
default_entry: 1

# Editor enabled
editor_enabled: yes

# Utopia OS Entry using Limine native protocol
/Utopia OS
    comment: Boot Utopia OS using Limine protocol
    protocol: limine
    kernel_path: boot():/boot/utopia_kernel

# Utopia OS (Verbose)
/Utopia OS (Verbose Mode)
    comment: Boot Utopia OS with verbose output
    protocol: limine
    kernel_path: boot():/boot/utopia_kernel

# Utopia OS (Debug)
/Utopia OS (Debug Mode)
    comment: Boot Utopia OS with debug output
    protocol: limine
    kernel_path: boot():/boot/utopia_kernel
